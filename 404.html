<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Twinimon Rolls | 404 Not Found</title>
  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/png" href="assets/favicon.png">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-dark: #0a0a0f;
      --bg-card: rgba(25, 25, 35, 0.6);
      --discord-blue: #5865F2;
      --accent-pink: #eb459e;
      --accent-purple: #8a2be2;
      --text-main: #ffffff;
      --text-muted: #a0a0b8;
    }
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Inter', sans-serif;
    }
    body {
      min-height: 100vh;
      background: var(--bg-dark);
      color: var(--text-main);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      position: relative;
      overflow: hidden;
    }
    .glow-orb {
      position: fixed;
      width: 450px;
      height: 450px;
      border-radius: 50%;
      filter: blur(110px);
      opacity: 0.30;
      z-index: 0;
      pointer-events: none;
      animation: float 28s infinite alternate ease-in-out;
    }
    .glow-1 {
      top: -80px;
      left: -120px;
      background: white;
    }
    .glow-2 {
      bottom: -100px;
      right: -70px;
      background: var(--accent-pink);
      animation-delay: -12s;
    }
    @keyframes float {
      0% { transform: translate(0, 0) scale(1); }
      100% { transform: translate(110px, 60px) scale(1.13); }
    }
    .center-card {
      z-index: 2;
      background: var(--bg-card);
      padding: 56px 40px 40px 40px;
      border-radius: 28px;
      border: 1.5px solid rgba(255,255,255,0.08);
      box-shadow: 0 8px 36px rgba(88, 101, 242, 0.07), 0 3px 14px 2px rgba(235,69,158,0.05);
      min-width: 330px;
      max-width: 90vw;
      text-align: center;
      backdrop-filter: blur(14px);
    }
    .error-logo {
      width: 96px;
      height: 125px;
      border-radius: 0px;
      border: 2px solid none;
      margin: 0 auto 16px auto;
      object-fit: cover;
      background: none;
      display: block;
    }
    .error-code {
      font-size: 2.8rem;
      font-weight: 800;
      letter-spacing: -1.5px;
      margin-bottom: 10px;
      background: linear-gradient(135deg, var(--discord-blue) 0%, var(--accent-pink) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .error-title {
      font-size: 1.4rem;
      font-weight: 700;
      margin-bottom: 16px;
    }
    .error-message {
      color: var(--text-muted);
      font-size: 1.08rem;
      margin-bottom: 30px;
      line-height: 1.6;
    }
    .btn {
      padding: 13px 30px;
      border-radius: 50px;
      font-weight: 700;
      display: inline-flex;
      align-items: center;
      gap: 10px;
      cursor: pointer;
      border: none;
      font-size: 1rem;
      text-decoration: none;
      transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
      background-color: var(--discord-blue);
      color: white;
      box-shadow: 0 8px 25px rgba(88, 101, 242, 0.18);
    }
    .btn:hover {
      background: var(--accent-pink);
      color: #fff;
      box-shadow: 0 8px 30px 0 rgba(235,69,158,0.24);
      transform: translateY(-2px) scale(1.03);
    }
    footer {
      margin-top: 48px;
      text-align: center;
      font-size: 0.95rem;
      color: var(--text-muted);
      z-index: 1;
    }
    @media (max-width: 600px) {
      .center-card {
        padding: 32px 8vw 24px 8vw;
        min-width: unset;
      }
      .error-code {
        font-size: 2rem;
      }
    }
  </style>
</head>
<body>
  <div class="glow-orb glow-1"></div>
  <div class="glow-orb glow-2"></div>
  <div class="center-card">
    <img src="assets/sad-monkey.png" alt="Sad Monkey" class="error-logo"/>
    <div class="error-code">404</div>
    <div class="error-title">Page Not Found</div>
    <div class="error-message">
      Oops! The page you are looking for doesn't exist or has been moved.<br>
      <br>
      If you believe this is an error, please check the URL or return home.
    </div>
    <a href="index.html" class="btn">
      ← Back to Home
    </a>
  </div>
  <footer>
    &copy; 2026 Twinimon Rolls. Not affiliated with Discord Inc.
  </footer>
  
  <script src="scripts/snowfall.js"></script>
  <script src="scripts/monkey.js"></script>

</body>
</html>
