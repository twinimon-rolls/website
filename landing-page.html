<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Twinimon Rolls | Landing Page</title>
  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/png" href="assets/favicon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-dark: #0a0a0f;
      --bg-overlay: rgba(15, 13, 25, .80);
      --discord-blue: #5865F2;
      --discord-hover: #4752C4;
      --accent-pink: #eb459e;
      --accent-purple: #8a2be2;
      --text-main: #ffffff;
      --text-muted: #a6afd3;
      --card-radius: 28px;
      --transition: cubic-bezier(.52,.02,.44,1);
      --shadow: 0 8px 64px 2px rgba(88, 101, 242, 0.27);
      --glow1: 0 0 200px 60px #5865f266;
      --glow2: 0 0 180px 90px #eb459e22;
    }
    html, body {
      height: 100%;
      margin: 0;
      padding: 0;
    }
    body {
      min-height: 100vh;
      background: linear-gradient(120deg, var(--discord-blue) 0%, var(--bg-dark) 70%, var(--accent-pink) 100%);
      color: var(--text-main);
      font-family: 'Inter', Arial, Helvetica, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
      position: relative;
      animation: bgfade 1.8s var(--transition);
    }
    @keyframes bgfade {
      from { opacity: 0; transform: scale(1.016);}
      to {   opacity: 1; transform: scale(1);}
    }
    .glow-orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(52px);
      pointer-events: none;
      opacity: 0.75;
      z-index: 0;
    }
    .glow-1 {
      top: 60px; left: -80px; width: 360px; height: 360px; background: var(--discord-blue);
      box-shadow: var(--glow1);
      opacity: 0.60;
      animation: orbmove1 16s ease-in-out infinite alternate;
    }
    .glow-2 {
      bottom: -90px; right: -115px; width: 330px; height: 330px; background: var(--accent-pink);
      box-shadow: var(--glow2);
      opacity: 0.5;
      animation: orbmove2 17s ease-in-out infinite alternate-reverse;
    }
    @keyframes orbmove1 {
      0% {transform: translateY(0) scale(1);}
      100% {transform: translateY(60px) scale(1.09);}
    }
    @keyframes orbmove2 {
      0% {transform: translate(0,0);}
      100% {transform: translate(-30px, 45px);}
    }
    .fadein {
      animation: fadein 1.15s 0.15s var(--transition) backwards;
    }
    @keyframes fadein {
      from { opacity: 0; transform: translateY(30px);}
      to { opacity: 1; transform: none;}
    }
    .center-card {
      background: var(--bg-overlay);
      box-shadow: var(--shadow);
      border-radius: var(--card-radius);
      padding: 54px 38px 40px 38px;
      display: flex;
      flex-direction: column;
      align-items: center;
      max-width: 420px;
      width: 96vw;
      margin: 0 auto;
      position: relative;
      z-index: 2;
      backdrop-filter: blur(6px);
      border: 1.5px solid rgba(170,170,255,0.14);
      animation: cardin 1.1s 0.23s var(--transition) both;
    }
    @keyframes cardin {
      from { opacity: 0; transform: translateY(48px) scale(.99);}
      to {   opacity: 1; transform: none;}
    }
    .server-icon {
      width: 76px;
      height: 76px;
      border-radius: 18px;
      margin-bottom: 20px;
      background: #fff;
      object-fit: cover;
      box-shadow: 0 4px 22px 0 #5865f23a, 0 2px 6px #eb459e22;
      border: 2.5px solid var(--discord-blue);
      display: block;
      transition: box-shadow .26s var(--transition), transform .17s var(--transition);
    }
    .server-icon:hover {
      box-shadow: 0 2px 68px 4px #eb459e36, 0 2px 12px #5865f244;
      transform: scale(1.04) rotate(-2deg);
    }
    h1 {
      font-size: 2.32rem;
      font-weight: 800;
      margin-bottom: 10px;
      background: linear-gradient(90deg, var(--discord-blue) 20%, var(--accent-pink) 85%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      text-fill-color: transparent;
      text-align: center;
      letter-spacing: 2.1px;
      transition: all .2s var(--transition);
    }
    .subtitle {
      color: var(--text-muted);
      font-size: 1.11rem;
      margin-bottom: 32px;
      text-align: center;
      max-width: 340px;
      line-height: 1.7;
      font-weight: 500;
      opacity: .96;
    }
    .badges {
      display: flex;
      gap: 12px;
      margin-bottom: 22px;
      flex-wrap: wrap;
      justify-content: center;
    }
    .badge {
      display: inline-block;
      font-size: 0.83rem;
      letter-spacing: 0.6px;
      background: linear-gradient(95deg, #504fd7 50%, #eb459e92 100%);
      color: #fff;
      border-radius: 36px;
      padding: 6px 17px;
      font-weight: 700;
      opacity: 0.88;
      user-select: none;
      border: 1.2px solid rgba(90,110,255,0.17);
      box-shadow: 0 1.5px 16px 0 #5865f211;
      animation: badgepulse 2.7s infinite;
    }
    @keyframes badgepulse {
      0%, 100% { opacity: 0.86;}
      50% { opacity: 1;}
    }
    .btn-join {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 16px 46px;
      border-radius: 40px;
      background: linear-gradient(93deg, var(--discord-blue) 60%, var(--accent-pink) 100%);
      color: #fff;
      text-decoration: none;
      font-size: 1.08rem;
      font-weight: 800;
      box-shadow: 0 10px 36px 0 #3e54fa2e;
      border: none;
      cursor: pointer;
      transition: background .22s var(--transition), transform .14s var(--transition), box-shadow .22s var(--transition);
      margin-top: 15px;
      margin-bottom: 0;
      position: relative;
      overflow: hidden;
      letter-spacing: 0.2px;
    }
    .btn-join:after {
      content: '';
      position: absolute;
      left: 30%;
      top: 0;
      width: 110%;
      height: 110%;
      pointer-events: none;
      background: linear-gradient(120deg, #fff7 10%, transparent 70%);
      opacity: 0;
      transition: opacity .41s;
    }
    .btn-join:focus:after,
    .btn-join:hover:after {
      opacity: .15;
    }
    .btn-join:hover {
      background: linear-gradient(98deg, var(--discord-hover) 53%, var(--accent-pink) 114%);
      transform: translateY(-2.5px) scale(1.034);
      box-shadow: 0 14px 48px 0 #eb459e42, 0 5px 32px #3e54fa2c;
    }
    .discord-svg {
      display: block;
      filter: drop-shadow(0 1px 2px #3e54fa22);
      transition: transform .23s;
    }
    .btn-join:hover .discord-svg {
      transform: scale(1.11) rotate(-8deg);
    }
    footer {
      position: fixed;
      bottom: 20px;
      width: 100vw;
      text-align: center;
      color: var(--text-muted);
      font-size: 0.97rem;
      letter-spacing: .25px;
      z-index: 9;
      left: 0; right: 0;
      pointer-events: none;
      user-select: none;
      opacity: 0.82;
      text-shadow: 0 1px 4.5px #29295e58;
    }
    @media (max-width: 540px) {
      .center-card {
        padding: 20px 7px 18px 7px;
        border-radius: 14px;
      }
      h1 {
        font-size: 1.38rem;
        letter-spacing: 1.1px;
      }
      .subtitle {
        font-size: 0.98rem;
        margin-bottom: 22px;
      }
      .btn-join {
        font-size: .93rem;
        padding: 13px 17px;
      }
      .server-icon {
        width: 44px;
        height: 44px;
        margin-bottom: 12px;
      }
      .badges {
        flex-wrap: wrap;
        gap: 8px;
        margin-bottom: 12px;
      }
    }
  </style>
</head>
<body>
  <div class="glow-orb glow-1"></div>
  <div class="glow-orb glow-2"></div>
  <div class="center-card fadein">
    <img src="assets/favicon.png" alt="Twinimon Rolls Discord Icon" class="server-icon" />
    <div class="badges">

    </div>
    <h1>Welcome to Twinimon Rolls</h1>

    </p>
